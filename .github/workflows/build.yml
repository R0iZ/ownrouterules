name: Build rules

on:
  push:
    paths:
      - "source/**"
      - "build.py"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  RUNETFREEDOM_GEOSITE_URL: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geosite/release/geosite.dat
  RUNETFREEDOM_GEOIP_URL: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/geoip-ru-only.dat

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download external rule databases
        run: |
          mkdir -p output/import
          curl -fsSL -o output/import/russia-geosite.dat "${RUNETFREEDOM_GEOSITE_URL}"
          curl -fsSL -o output/import/russia-geoip.dat "${RUNETFREEDOM_GEOIP_URL}"

      - name: Extract external databases
        run: |
          git clone --depth=1 https://github.com/urlesistiana/v2dat.git /tmp/v2dat
          cd /tmp/v2dat
          go build -o v2dat .
          mkdir -p "${GITHUB_WORKSPACE}/output/import/geosite-unpacked" \
            "${GITHUB_WORKSPACE}/output/import/geoip-unpacked"
          ./v2dat unpack geosite -o "${GITHUB_WORKSPACE}/output/import/geosite-unpacked" \
            "${GITHUB_WORKSPACE}/output/import/russia-geosite.dat"
          ./v2dat unpack geoip -o "${GITHUB_WORKSPACE}/output/import/geoip-unpacked" \
            "${GITHUB_WORKSPACE}/output/import/russia-geoip.dat"
          test "$(find "${GITHUB_WORKSPACE}/output/import/geosite-unpacked" -name '*.txt' | wc -l)" -gt 0
          test "$(find "${GITHUB_WORKSPACE}/output/import/geoip-unpacked" -name '*.txt' | wc -l)" -gt 0

      - name: Generate sources
        run: python3 build.py

      - name: Build geosite.dat
        if: hashFiles('source/*.txt') != ''
        run: |
          git clone --depth=1 https://github.com/v2fly/domain-list-community.git /tmp/dlc
          cd /tmp/dlc
          go mod download
          go run ./ --datapath="${GITHUB_WORKSPACE}/output/geosite-data"
          test -f dlc.dat
          cp dlc.dat "${GITHUB_WORKSPACE}/output/geosite.dat"

      - name: Build geoip.dat
        if: hashFiles('source/ip/*.txt') != ''
        run: |
          git clone --depth=1 https://github.com/v2fly/geoip.git /tmp/geoip
          cd /tmp/geoip
          go mod download
          go run ./ -c "${GITHUB_WORKSPACE}/output/geoip-config.json"
          test -f "${GITHUB_WORKSPACE}/output/geoip.dat"

      - name: Build SRS files
        run: |
          git clone --depth=1 https://github.com/runetfreedom/geodat2srs.git /tmp/geodat2srs
          cd /tmp/geodat2srs
          go build -o geodat2srs .
          rm -rf "${GITHUB_WORKSPACE}/output/srs"
          mkdir -p "${GITHUB_WORKSPACE}/output/srs"

          if [ -f "${GITHUB_WORKSPACE}/output/geosite.dat" ]; then
            ./geodat2srs geosite \
              -i "${GITHUB_WORKSPACE}/output/geosite.dat" \
              -o "${GITHUB_WORKSPACE}/output/srs"
          fi

          if [ -f "${GITHUB_WORKSPACE}/output/geoip.dat" ]; then
            ./geodat2srs geoip \
              -i "${GITHUB_WORKSPACE}/output/geoip.dat" \
              -o "${GITHUB_WORKSPACE}/output/srs"
          fi

          shopt -s nullglob
          for f in "${GITHUB_WORKSPACE}/output/srs"/geosite-*.srs; do
            mv "$f" "${f/geosite-/}"
          done
          for f in "${GITHUB_WORKSPACE}/output/srs"/geoip-*.srs; do
            mv "$f" "${f/geoip-/}"
          done

      - name: Verify outputs
        run: |
          test -f output/yaml/blocked-domains.yaml
          test -f output/ip/blocked-ip.txt
          domain_total=$(grep -E '^# TOTAL:' output/yaml/blocked-domains.yaml | awk '{print $3}')
          ip_total=$(grep -cve '^\s*$' output/ip/blocked-ip.txt)
          echo "blocked-domains total: ${domain_total}"
          echo "blocked-ip total: ${ip_total}"
          test "${domain_total}" -gt 1000
          test "${ip_total}" -gt 0
          # Remove legacy classical IP YAML if present (too heavy for routers).
          rm -f output/yaml/blocked-ip.yaml

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Build rule files"
          file_pattern: output/**
          add_options: "-A"
