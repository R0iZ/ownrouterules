name: Build rules

on:
  push:
    paths:
      - "source/**"
      - "build.py"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Generate yaml and geosite sources
        run: python3 build.py

      - name: Build geosite.dat
        run: |
          git clone --depth=1 https://github.com/v2fly/domain-list-community.git /tmp/dlc
          cd /tmp/dlc
          go mod download
          go run ./ --datapath="${GITHUB_WORKSPACE}/output/geosite-data"
          test -f dlc.dat
          cp dlc.dat "${GITHUB_WORKSPACE}/output/geosite.dat"

      - name: Build SRS from geosite.dat
        run: |
          git clone --depth=1 https://github.com/runetfreedom/geodat2srs.git /tmp/geodat2srs
          cd /tmp/geodat2srs
          go build -o geodat2srs .
          rm -rf "${GITHUB_WORKSPACE}/output/srs"
          mkdir -p "${GITHUB_WORKSPACE}/output/srs"
          ./geodat2srs geosite \
            -i "${GITHUB_WORKSPACE}/output/geosite.dat" \
            -o "${GITHUB_WORKSPACE}/output/srs"
          shopt -s nullglob
          for f in "${GITHUB_WORKSPACE}/output/srs"/geosite-*.srs; do
            mv "$f" "${f/geosite-/}"
          done

      - name: Verify outputs
        run: |
          test -f output/geosite.dat
          test "$(find output/srs -maxdepth 1 -name '*.srs' | wc -l)" -gt 0
          ls -la output/yaml output/srs output/geosite.dat

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Build rule files"
          file_pattern: output/**
          add_options: "-A"
