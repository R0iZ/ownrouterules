name: Build rules

on:
  push:
    paths:
      - "source/**"
      - "build.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install sing-box
        run: |
          TAG=$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          VERSION="${TAG#v}"
          curl -fsSL -o sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          SING_BOX_DIR="${GITHUB_WORKSPACE}/sing-box-${VERSION}-linux-amd64"
          echo "${SING_BOX_DIR}" >> "$GITHUB_PATH"
          sing-box version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Generate yaml and srs sources
        run: python3 build.py

      - name: Build geosite.dat
        run: |
          git clone --depth=1 https://github.com/v2fly/domain-list-community.git /tmp/dlc
          cd /tmp/dlc
          go mod download
          go run ./ --datapath="${GITHUB_WORKSPACE}/output/geosite-data"
          test -f dlc.dat
          cp dlc.dat "${GITHUB_WORKSPACE}/output/geosite.dat"

      - name: Verify outputs
        run: |
          test -f output/geosite.dat
          ls -la output/yaml output/srs output/geosite.dat

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Build rule files"
          file_pattern: output/**
